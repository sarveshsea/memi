name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: 'Expected npm version after publish'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false
      - run: npm ci --ignore-scripts
      - run: npm run check:release
      - run: npm run lint
      - run: npm test -- --run
      - run: npm run build
      - name: Prepare npm publishing auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm --version
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}"
            echo "Configured npm token fallback."
          else
            echo "No NPM_TOKEN configured; npm publish will use trusted publishing OIDC."
          fi
      - name: Publish npm package
        run: npm publish --access public
      - name: Verify npm release
        run: node scripts/verify-npm-release.mjs
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
