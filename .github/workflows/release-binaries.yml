name: Build release binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing semver release tag to repair
        required: true
        type: string

env:
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

jobs:
  release-gate:
    name: release gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci --include=optional --ignore-scripts

      - name: Check release metadata
        run: npm run check:release

  build:
    name: ${{ matrix.target }}
    needs: release-gate
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
            esbuildPackage: darwin-arm64
          - target: darwin-x64
            runner: macos-15-intel
            esbuildPackage: darwin-x64
          - target: linux-x64
            runner: ubuntu-latest
            esbuildPackage: linux-x64
          - target: win-x64
            runner: windows-latest
            esbuildPackage: win32-x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: npm ci --include=optional --ignore-scripts

      - name: Ensure platform esbuild binary
        shell: bash
        run: |
          ESBUILD_VERSION="$(node -p "require('./node_modules/vite/node_modules/esbuild/package.json').version")"
          npm install --no-save --package-lock=false --ignore-scripts "@esbuild/${{ matrix.esbuildPackage }}@${ESBUILD_VERSION}"

      - name: Check release metadata
        env:
          SKIP_AUDIT_GATE: "1"
        run: npm run check:release

      - name: Typecheck and build tsc output
        run: |
          npm run typecheck
          npm run build

      - name: Build binary
        run: node scripts/build-binary.mjs --target=${{ matrix.target }}

      - name: Smoke test
        shell: bash
        run: |
          cd dist-bin/memi-${{ matrix.target }}
          if [ -f ./memi.exe ]; then
            ./memi.exe --version
          else
            ./memi --version
          fi

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist-bin/memi-${{ matrix.target }}.tar.gz
            dist-bin/memi-${{ matrix.target }}.zip
            dist-bin/memi-${{ matrix.target }}.tar.gz.sha256
            dist-bin/memi-${{ matrix.target }}.zip.sha256
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-checksums:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all release assets
        run: |
          mkdir -p sums
          gh release download "${RELEASE_TAG}" -R "${GITHUB_REPOSITORY}" \
            --pattern '*.sha256' --dir sums
          cat sums/*.sha256 > SHA256SUMS.txt
          cat SHA256SUMS.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload combined SHA256SUMS.txt
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docker:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.binary
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ env.RELEASE_TAG }}
          tags: |
            ghcr.io/sarveshsea/memi:latest
            ghcr.io/sarveshsea/memi:${{ env.RELEASE_TAG }}

  publish-homebrew:
    needs: publish-checksums
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Download SHA256SUMS
        run: |
          mkdir -p dist-bin
          gh release download "${RELEASE_TAG}" -R "${GITHUB_REPOSITORY}" \
            --pattern 'SHA256SUMS.txt' --dir dist-bin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Render Homebrew formula
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          node scripts/homebrew/update-formula.mjs --version="${VERSION}" --out=memoire.rb
          test -s memoire.rb
          ruby -c memoire.rb
      - name: Push to tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN secret is required to publish the tap"
            exit 1
          fi
          git clone "https://x-access-token:${GH_TOKEN}@github.com/sarveshsea/homebrew-memi.git" tap
          mkdir -p tap/Formula
          cp memoire.rb tap/Formula/memoire.rb
          cd tap
          VERSION="${RELEASE_TAG#v}"
          grep -Fq "version \"${VERSION}\"" Formula/memoire.rb
          git config user.name "sarveshsea-bot"
          git config user.email "bot@memoire.cv"
          git add Formula/memoire.rb
          if ! git diff --cached --quiet; then
            git commit -m "memoire ${RELEASE_TAG}"
          fi
          git push
